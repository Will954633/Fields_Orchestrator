<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fields Chat Agent</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0A0A0F;
            color: #F9FAFB;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header {
            padding: 16px 20px 12px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }

        .brand-label {
            position: absolute;
            top: 14px;
            left: 20px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(156, 163, 175, 0.45);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .model-label {
            color: #6B7280;
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .task-badge {
            background: #2563EB;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            display: none;
        }
        .task-badge.active { display: inline-block; }

        .call-timer {
            font-size: 13px;
            color: #6B7280;
            margin-top: 4px;
            display: none;
        }
        .call-timer.active {
            display: block;
            color: #22C55E;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .msg-group { display: flex; flex-direction: column; gap: 2px; }

        .msg-label {
            font-size: 11px;
            color: #6B7280;
            padding: 0 4px;
            margin-top: 8px;
        }
        .msg-label.user { text-align: right; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.45;
            max-width: 88%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg-bubble.user {
            background: #1E3A5F;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.agent {
            background: #1F2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-bubble.error {
            background: #7F1D1D;
            align-self: center;
            font-size: 13px;
        }

        .msg-bubble.system {
            background: #1a2744;
            align-self: center;
            font-size: 13px;
            color: #60A5FA;
            border-radius: 12px;
            padding: 8px 14px;
        }

        /* Streaming agent bubble */
        .msg-bubble.agent .stream-cursor {
            display: inline-block;
            width: 2px;
            height: 14px;
            background: #60A5FA;
            animation: blink 0.8s ease-in-out infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Tool call indicators */
        .tool-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            font-size: 12px;
            color: #9CA3AF;
            background: rgba(31, 41, 55, 0.5);
            border-radius: 8px;
            margin: 2px 0;
            align-self: flex-start;
            max-width: 88%;
            font-family: 'SF Mono', Menlo, monospace;
        }
        .tool-indicator .tool-icon {
            color: #F59E0B;
            font-size: 10px;
        }
        .tool-indicator .tool-name {
            color: #60A5FA;
            font-weight: 600;
        }
        .tool-indicator .tool-input {
            color: #6B7280;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Code blocks inside agent messages */
        .msg-bubble.agent code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 5px;
            border-radius: 4px;
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 13px;
        }
        .msg-bubble.agent pre {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 6px 0;
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
        }

        /* Permission approval inline */
        .permission-request {
            background: #1a2744;
            border: 1px solid #2563EB;
            border-radius: 12px;
            padding: 10px 14px;
            align-self: flex-start;
            max-width: 88%;
            margin: 4px 0;
        }
        .permission-request .perm-title {
            font-size: 13px;
            color: #60A5FA;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .permission-request .perm-detail {
            font-size: 12px;
            color: #9CA3AF;
            font-family: 'SF Mono', Menlo, monospace;
            margin-bottom: 8px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .permission-request .perm-actions {
            display: flex;
            gap: 8px;
        }
        .permission-request .perm-btn {
            padding: 4px 16px;
            border-radius: 6px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .perm-btn.approve { background: #22C55E; color: white; }
        .perm-btn.deny { background: #EF4444; color: white; }

        /* Text input bar */
        .text-input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #111118;
            border-top: 1px solid #1F2937;
            flex-shrink: 0;
        }
        .text-input-bar input {
            flex: 1;
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 20px;
            padding: 10px 16px;
            color: #F9FAFB;
            font-size: 15px;
            outline: none;
            font-family: inherit;
        }
        .text-input-bar input:focus {
            border-color: #2563EB;
        }
        .text-input-bar input::placeholder {
            color: #6B7280;
        }
        .text-send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #2563EB;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .text-send-btn:disabled {
            background: #374151;
            cursor: not-allowed;
        }
        .text-send-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: #1F2937;
            border: 1px solid #374151;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            color: #F9FAFB;
            animation: toast-in 0.3s ease-out;
            pointer-events: auto;
        }

        .toast.success { border-color: #22C55E; }
        .toast.error { border-color: #EF4444; }
        .toast.info { border-color: #2563EB; }

        @keyframes toast-in {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Task panel */
        .task-panel {
            background: #111827;
            border-top: 1px solid #1F2937;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .task-panel.open { max-height: 200px; overflow-y: auto; }

        .task-panel-header {
            padding: 8px 16px;
            font-size: 12px;
            color: #6B7280;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .task-card {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .task-status {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-status .dot-spinner {
            width: 10px; height: 10px;
            border: 2px solid #2563EB;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .task-status .dot-done { color: #22C55E; font-size: 16px; }
        .task-status .dot-fail { color: #EF4444; font-size: 16px; }
        .task-status .dot-queued { color: #F59E0B; font-size: 10px; }

        .task-title { flex: 1; color: #D1D5DB; }
        .task-elapsed { color: #6B7280; font-size: 11px; }

        /* Controls */
        .controls {
            padding: 12px 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .status {
            font-size: 14px;
            color: #9CA3AF;
            min-height: 20px;
        }
        .status.listening { color: #22C55E; }
        .status.processing { color: #F59E0B; }
        .status.speaking { color: #60A5FA; }

        .call-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #22C55E;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .call-btn.in-call { background: #EF4444; }

        .call-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
        }

        @keyframes listen-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 18px rgba(34, 197, 94, 0); }
        }

        .call-btn.listening {
            animation: listen-pulse 1.5s ease-in-out infinite;
            background: #22C55E;
        }

        .call-btn.processing { background: #4B5563; }

        @keyframes speak-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.3); }
            50% { box-shadow: 0 0 0 14px rgba(96, 165, 250, 0); }
        }

        .call-btn.speaking {
            background: #2563EB;
            animation: speak-glow 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .volume-bar-wrap {
            width: 120px;
            height: 4px;
            background: #1F2937;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .volume-bar-wrap.active { display: block; }
        .volume-bar {
            height: 100%;
            width: 0%;
            background: #22C55E;
            border-radius: 2px;
            transition: width 0.1s;
        }

        .connection-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .connection-dot.ok { background: #22C55E; }
        .connection-dot.fail { background: #EF4444; }
        .connection-dot.checking { background: #F59E0B; }

        /* Model toggle */
        .model-toggle {
            display: flex;
            gap: 4px;
            background: #1F2937;
            border-radius: 16px;
            padding: 2px;
            margin-top: 8px;
        }

        .model-btn {
            padding: 5px 10px;
            border-radius: 14px;
            border: none;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #6B7280;
            white-space: nowrap;
        }

        .model-btn.active {
            background: #2563EB;
            color: white;
        }

        .model-btn.active.opus {
            background: #7C3AED;
        }

        .model-btn.active.gpt54 {
            background: #10A37F;
        }

        .model-btn.active.gpt54mini {
            background: #10A37F;
        }

        .model-hint {
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.72);
            text-align: center;
        }

        /* Todo panel */
        .todo-panel {
            background: #111827;
            border-top: 1px solid #1F2937;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .todo-panel.open { max-height: 250px; overflow-y: auto; }

        .todo-panel-header {
            padding: 8px 16px;
            font-size: 12px;
            color: #6B7280;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .todo-badge {
            background: #DC2626;
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 6px;
        }
        .todo-badge.warn { background: #F59E0B; }

        .todo-card {
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .todo-priority {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .todo-priority.critical { background: #EF4444; }
        .todo-priority.high { background: #F97316; }
        .todo-priority.medium { background: #EAB308; }
        .todo-priority.low { background: #6B7280; }

        .todo-title { flex: 1; color: #D1D5DB; }
        .todo-title.overdue { color: #FCA5A5; }
        .todo-title.due-today { color: #FDE68A; }

        .todo-urgency {
            font-size: 11px;
            color: #6B7280;
            white-space: nowrap;
        }
        .todo-urgency.overdue { color: #EF4444; font-weight: 600; }
        .todo-urgency.due-today { color: #F59E0B; font-weight: 600; }

        .todo-actions {
            display: flex;
            gap: 4px;
        }
        .todo-action-btn {
            background: none;
            border: 1px solid #374151;
            color: #9CA3AF;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            cursor: pointer;
        }
        .todo-action-btn:hover { border-color: #6B7280; color: #D1D5DB; }
        .todo-action-btn.done-btn:hover { border-color: #22C55E; color: #22C55E; }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="header">
        <div class="brand-label">Fields Chat Agent</div>
        <div class="model-label" id="modelLabel">
            <span>
                <span class="connection-dot checking" id="connDot"></span>
                <span id="modelName">GPT-5.4-mini · Voice</span>
            </span>
            <span class="task-badge" id="taskBadge">0 tasks</span>
        </div>
        <div class="model-toggle">
            <button class="model-btn" data-lock="auto" id="btnAuto">Auto</button>
            <button class="model-btn" data-lock="haiku" id="btnHaiku">Haiku</button>
            <button class="model-btn" data-lock="opus" id="btnOpus">Opus</button>
            <button class="model-btn" data-lock="gpt54" id="btnGpt54">GPT-5.4</button>
            <button class="model-btn active" data-lock="gpt54mini" id="btnGpt54Mini">5.4-mini</button>
        </div>
        <div class="model-hint" id="modelHint">GPT chat is direct. Code, email, and other work requests run as GPT background tasks.</div>
        <div class="call-timer" id="callTimer">00:00</div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <!-- Todo panel (collapsible) -->
    <div class="todo-panel" id="todoPanel">
        <div class="todo-panel-header" id="todoPanelHeader">
            <span>Todos <span id="todoBadge" style="display:none" class="todo-badge">0</span></span>
            <span id="todoPanelToggle">&#9660;</span>
        </div>
        <div id="todoList"></div>
    </div>

    <!-- Task panel (collapsible) -->
    <div class="task-panel" id="taskPanel">
        <div class="task-panel-header" id="taskPanelHeader">
            <span>Background Tasks</span>
            <span id="taskPanelToggle">&#9660;</span>
        </div>
        <div id="taskList"></div>
    </div>

    <!-- Text input bar -->
    <div class="text-input-bar" id="textInputBar">
        <input type="text" id="textInput" placeholder="Type a message..." autocomplete="off" />
        <button class="text-send-btn" id="textSendBtn" disabled>
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>

    <div class="controls">
        <div class="volume-bar-wrap" id="volumeWrap">
            <div class="volume-bar" id="volumeBar"></div>
        </div>
        <div class="status" id="status">Connecting...</div>
        <button class="call-btn" id="callBtn">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </button>
    </div>

    <script>
    (function() {
        const API_BASE = location.origin;

        // ---- State ----
        let inCall = false;
        let phase = 'idle';
        let mediaStream = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let currentRecorderMimeType = '';
        let audioContext = null;
        let analyserNode = null;
        let currentAudio = null;
        let pendingNotifications = [];  // Queue task notifications during call
        let speakingNotification = false;

        // VAD settings
        const SILENCE_THRESHOLD = 0.015;
        const SILENCE_DURATION = 1500;
        const MIN_SPEECH_DURATION = 400;

        let silenceStart = 0;
        let speechDetected = false;
        let speechStart = 0;
        let vadInterval = null;

        // Call timer
        let callStartTime = 0;
        let timerInterval = null;

        // Tasks
        let activeTasks = {};

        // DOM
        const chatArea = document.getElementById('chatArea');
        const statusEl = document.getElementById('status');
        const callBtn = document.getElementById('callBtn');
        const connDot = document.getElementById('connDot');
        const volumeWrap = document.getElementById('volumeWrap');
        const volumeBar = document.getElementById('volumeBar');
        const callTimer = document.getElementById('callTimer');
        const toastContainer = document.getElementById('toastContainer');
        const taskBadge = document.getElementById('taskBadge');
        const taskPanel = document.getElementById('taskPanel');
        const taskList = document.getElementById('taskList');
        const taskPanelHeader = document.getElementById('taskPanelHeader');

        const modelName = document.getElementById('modelName');
        const btnAuto = document.getElementById('btnAuto');
        const btnHaiku = document.getElementById('btnHaiku');
        const btnOpus = document.getElementById('btnOpus');
        const textInput = document.getElementById('textInput');
        const textSendBtn = document.getElementById('textSendBtn');

        let currentModelLock = 'gpt54mini';
        let isStreaming = false;  // Currently streaming a response

        function pickRecorderMimeType() {
            const candidates = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/mp4;codecs=mp4a.40.2',
                'audio/mp4',
                'audio/ogg;codecs=opus',
                'audio/ogg',
            ];
            return candidates.find(type => MediaRecorder.isTypeSupported(type)) || '';
        }

        function extensionForMimeType(mimeType) {
            const normalized = (mimeType || '').split(';', 1)[0].trim().toLowerCase();
            if (normalized === 'audio/webm' || normalized === 'video/webm') return 'webm';
            if (normalized === 'audio/mp4' || normalized === 'video/mp4' || normalized === 'audio/x-m4a') return 'mp4';
            if (normalized === 'audio/ogg' || normalized === 'video/ogg') return 'ogg';
            if (normalized === 'audio/mpeg' || normalized === 'audio/mp3') return 'mp3';
            if (normalized === 'audio/wav' || normalized === 'audio/x-wav') return 'wav';
            return 'webm';
        }

        // Model toggle buttons
        document.querySelectorAll('.model-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const lock = btn.dataset.lock;
                try {
                    const formData = new FormData();
                    formData.append('lock', lock);
                    await fetch(API_BASE + '/api/model', { method: 'POST', body: formData });
                    setModelLock(lock);
                } catch (e) {
                    console.error('Failed to set model:', e);
                }
            });
        });

        function setModelLock(lock) {
            currentModelLock = lock;
            document.querySelectorAll('.model-btn').forEach(b => {
                b.classList.remove('active', 'opus', 'gpt54', 'gpt54mini');
                if (b.dataset.lock === lock) {
                    b.classList.add('active');
                    if (lock === 'opus') b.classList.add('opus');
                    if (lock === 'gpt54') b.classList.add('gpt54');
                    if (lock === 'gpt54mini') b.classList.add('gpt54mini');
                }
            });
            const labels = {
                auto: 'Auto · Fields Agent',
                haiku: 'Haiku · Fast',
                opus: 'Opus · Deep',
                gpt54: 'GPT-5.4 · Chat + GPT Tasks',
                gpt54mini: 'GPT-5.4-mini · Voice + GPT Tasks',
            };
            modelName.textContent = labels[lock] || labels.auto;
        }

        // Update model lock from server responses
        function updateModelFromResponse(data) {
            if (data && data.model_lock && data.model_lock !== currentModelLock) {
                setModelLock(data.model_lock);
            }
        }

        // Icons
        const PHONE_ICON = '<svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>';
        const HANGUP_ICON = '<svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>';
        const SPINNER_HTML = '<div class="spinner"></div>';

        // ==========================
        // SSE — Server-Sent Events
        // ==========================

        let eventSource = null;
        let taskPollInterval = null;

        function upsertTask(task) {
            if (!task || !task._id) return;
            if (task.status === 'queued' || task.status === 'running') {
                const existing = activeTasks[task._id] || {};
                activeTasks[task._id] = {
                    title: task.title || existing.title || 'Background task',
                    status: task.status || existing.status || 'queued',
                    started: existing.started || Date.now(),
                };
            } else {
                delete activeTasks[task._id];
            }
            updateTaskBadge();
            updateTaskPanel();
        }

        async function syncTaskById(taskId, fallbackTitle) {
            if (!taskId) return;
            try {
                const resp = await fetch(API_BASE + '/api/tasks/' + encodeURIComponent(taskId));
                if (!resp.ok) throw new Error('task detail unavailable');
                const data = await resp.json();
                if (data.task) {
                    upsertTask(data.task);
                    return;
                }
            } catch {}

            if (!activeTasks[taskId]) {
                activeTasks[taskId] = {
                    title: fallbackTitle || 'Background task',
                    status: 'queued',
                    started: Date.now(),
                };
                updateTaskBadge();
                updateTaskPanel();
                showToast(`Task started: ${fallbackTitle || 'Background task'}`, 'info');
            }
        }

        async function pollTasks() {
            try {
                const resp = await fetch(API_BASE + '/api/tasks');
                if (!resp.ok) throw new Error('task poll failed');
                const data = await resp.json();
                const nextActive = {};
                for (const task of (data.tasks || [])) {
                    if (task.status === 'queued' || task.status === 'running') {
                        const existing = activeTasks[task._id] || {};
                        nextActive[task._id] = {
                            title: task.title || existing.title || 'Background task',
                            status: task.status || existing.status || 'queued',
                            started: existing.started || Date.now(),
                        };
                    }
                }
                activeTasks = nextActive;
                updateTaskBadge();
                updateTaskPanel();
            } catch (err) {
                console.log('Task poll failed:', err);
            }
        }

        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource(API_BASE + '/api/events');

            eventSource.addEventListener('task_started', (e) => {
                const data = JSON.parse(e.data);
                upsertTask({ _id: data.task_id, title: data.title, status: data.status });
                showToast(`Task started: ${data.title}`, 'info');
            });

            eventSource.addEventListener('task_progress', (e) => {
                const data = JSON.parse(e.data);
                upsertTask({ _id: data.task_id, title: activeTasks[data.task_id]?.title, status: 'running' });
            });

            eventSource.addEventListener('task_completed', (e) => {
                const data = JSON.parse(e.data);
                delete activeTasks[data.task_id];
                updateTaskBadge();
                updateTaskPanel();

                const msg = `Task done: ${data.title}`;
                showToast(msg, 'success');
                addMessage(`[Task completed] ${data.title}: ${data.summary || 'Done.'}`, 'system');

                // During a voice call, queue TTS notification
                if (inCall && phase === 'listening') {
                    pendingNotifications.push({
                        taskId: data.task_id,
                        text: data.summary || data.title + ' completed.',
                    });
                    flushPendingNotifications();
                }
            });

            eventSource.addEventListener('task_failed', (e) => {
                const data = JSON.parse(e.data);
                delete activeTasks[data.task_id];
                updateTaskBadge();
                updateTaskPanel();
                showToast(`Task failed: ${data.error || 'Unknown error'}`, 'error');
                addMessage(`[Task failed] ${data.error || 'Unknown error'}`, 'system');
            });

            eventSource.addEventListener('todo_reminder', (e) => {
                const data = JSON.parse(e.data);
                showToast(`Todo: ${data.title} — ${data.urgency || 'due'}`, data.overdue_days > 0 ? 'error' : 'info');
                loadTodos();
            });

            eventSource.onerror = () => {
                // Auto-reconnect is built into EventSource
                console.log('SSE connection lost, reconnecting...');
            };
        }

        function updateTaskBadge() {
            const count = Object.keys(activeTasks).length;
            if (count > 0) {
                taskBadge.textContent = count + (count === 1 ? ' task' : ' tasks');
                taskBadge.classList.add('active');
                taskPanel.classList.add('open');
            } else {
                taskBadge.classList.remove('active');
                taskPanel.classList.remove('open');
            }
        }

        function updateTaskPanel() {
            const entries = Object.entries(activeTasks);
            if (entries.length === 0) {
                taskList.innerHTML = '';
                return;
            }
            taskList.innerHTML = entries.map(([id, t]) => {
                const elapsed = Math.floor((Date.now() - (t.started || Date.now())) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
                const statusIcon = t.status === 'queued'
                    ? '<span class="dot-queued">&#9679;</span>'
                    : '<div class="dot-spinner"></div>';
                return `<div class="task-card">
                    <div class="task-status">${statusIcon}</div>
                    <span class="task-title">${t.title}</span>
                    <span class="task-elapsed">${timeStr}</span>
                </div>`;
            }).join('');
        }

        // Refresh task panel elapsed times
        setInterval(updateTaskPanel, 1000);

        // Toggle task panel
        taskPanelHeader.addEventListener('click', () => {
            taskPanel.classList.toggle('open');
        });

        // ==========================
        // Toast notifications
        // ==========================

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.textContent = message;
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ==========================
        // Health check + SSE init
        // ==========================

        async function healthCheck() {
            try {
                const r = await fetch(API_BASE + '/api/health');
                if (r.ok) {
                    connDot.className = 'connection-dot ok';
                    setStatus('Tap to start call');
                    connectSSE();
                    pollTasks();
                    if (taskPollInterval) clearInterval(taskPollInterval);
                    taskPollInterval = setInterval(pollTasks, 5000);
                    // Sync model lock state
                    try {
                        const mr = await fetch(API_BASE + '/api/model');
                        const md = await mr.json();
                        if (md.model_lock) setModelLock(md.model_lock);
                    } catch {};
                } else throw 0;
            } catch {
                connDot.className = 'connection-dot fail';
                setStatus('Cannot reach server');
            }
        }
        healthCheck();

        // ==========================
        // Todo panel
        // ==========================

        const todoPanel = document.getElementById('todoPanel');
        const todoList = document.getElementById('todoList');
        const todoPanelHeader = document.getElementById('todoPanelHeader');
        const todoBadge = document.getElementById('todoBadge');
        let todosData = [];

        async function loadTodos() {
            try {
                const resp = await fetch(API_BASE + '/api/todos');
                if (!resp.ok) return;
                const data = await resp.json();
                todosData = data.todos || [];
                renderTodos();
            } catch (e) {
                console.log('Todo load failed:', e);
            }
        }

        function renderTodos() {
            if (todosData.length === 0) {
                todoPanel.classList.remove('open');
                todoBadge.style.display = 'none';
                todoList.innerHTML = '';
                return;
            }

            const urgent = todosData.filter(t => t.days_left !== null && t.days_left <= 0).length;
            const dueWeek = todosData.filter(t => t.days_left !== null && t.days_left > 0 && t.days_left <= 7).length;

            todoBadge.textContent = todosData.length;
            todoBadge.style.display = 'inline';
            todoBadge.className = 'todo-badge' + (urgent > 0 ? '' : ' warn');

            todoPanel.classList.add('open');

            todoList.innerHTML = todosData.map(t => {
                const titleClass = t.days_left !== null && t.days_left < 0 ? 'overdue'
                    : t.days_left === 0 ? 'due-today' : '';
                const urgencyClass = t.days_left !== null && t.days_left < 0 ? 'overdue'
                    : t.days_left === 0 ? 'due-today' : '';

                return `<div class="todo-card" data-id="${t._id}">
                    <div class="todo-priority ${t.priority}"></div>
                    <span class="todo-title ${titleClass}">${t.title}</span>
                    <span class="todo-urgency ${urgencyClass}">${t.urgency || ''}</span>
                    <div class="todo-actions">
                        <button class="todo-action-btn done-btn" onclick="todoAction('${t._id}','done')">Done</button>
                        <button class="todo-action-btn" onclick="todoAction('${t._id}','snooze')">+3d</button>
                    </div>
                </div>`;
            }).join('');
        }

        window.todoAction = async function(todoId, action) {
            try {
                if (action === 'done') {
                    await fetch(API_BASE + '/api/todos/' + todoId + '/done', { method: 'POST' });
                    showToast('Todo completed', 'success');
                } else if (action === 'snooze') {
                    const formData = new FormData();
                    formData.append('days', '3');
                    await fetch(API_BASE + '/api/todos/' + todoId + '/snooze', { method: 'POST', body: formData });
                    showToast('Snoozed +3 days', 'info');
                }
                await loadTodos();
            } catch (e) {
                showToast('Action failed: ' + e.message, 'error');
            }
        };

        todoPanelHeader.addEventListener('click', () => {
            todoPanel.classList.toggle('open');
        });

        // Load todos on startup and refresh every 5 minutes
        loadTodos();
        setInterval(loadTodos, 300000);

        // SSE listener for todo reminders
        // (will be connected after SSE is ready — add listener in connectSSE)

        // ---- Helpers ----
        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = 'status' + (cls ? ' ' + cls : '');
        }

        function setPhase(p) {
            phase = p;
            callBtn.className = 'call-btn in-call' + (p !== 'idle' ? ' ' + p : '');

            if (p === 'listening') {
                callBtn.innerHTML = HANGUP_ICON;
                setStatus('Listening...', 'listening');
                volumeWrap.classList.add('active');
            } else if (p === 'processing') {
                callBtn.innerHTML = SPINNER_HTML;
                setStatus('Thinking...', 'processing');
                volumeWrap.classList.remove('active');
            } else if (p === 'speaking') {
                callBtn.innerHTML = HANGUP_ICON;
                setStatus('Speaking...', 'speaking');
                volumeWrap.classList.remove('active');
            } else {
                callBtn.innerHTML = PHONE_ICON;
                callBtn.className = 'call-btn';
                setStatus('Tap to start call');
                volumeWrap.classList.remove('active');
            }
        }

        function vibrate(ms) {
            if (navigator.vibrate) navigator.vibrate(ms || 50);
        }

        function addMessage(text, type) {
            const group = document.createElement('div');
            group.className = 'msg-group';
            if (type !== 'system') {
                const label = document.createElement('div');
                label.className = 'msg-label ' + type;
                if (type === 'user') label.textContent = 'You';
                else if (type === 'error') label.textContent = '';
                else label.textContent = 'Claude';
                if (type !== 'error') group.appendChild(label);
            }
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble ' + type;
            // IDE-like rendering for agent messages
            if (type === 'agent') {
                bubble.innerHTML = renderMarkdown(text);
            } else {
                bubble.textContent = text;
            }
            group.appendChild(bubble);
            chatArea.appendChild(group);
            chatArea.scrollTop = chatArea.scrollHeight;
            return bubble;
        }

        // ---- IDE-like markdown rendering (#3) ----
        function renderMarkdown(text) {
            // Escape HTML first
            let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Code blocks (```lang\n...\n```)
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });
            // Inline code (`...`)
            html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');
            // Bold (**...**)
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            // File links — patterns like path/to/file.ext or [text](path)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<span style="color:#60A5FA;text-decoration:underline">$1</span>');
            return html;
        }

        // ---- Streaming text input (#4) ----
        function createStreamingBubble() {
            const group = document.createElement('div');
            group.className = 'msg-group';
            const label = document.createElement('div');
            label.className = 'msg-label agent';
            label.textContent = 'Claude';
            group.appendChild(label);
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble agent';
            bubble.innerHTML = '<span class="stream-cursor"></span>';
            group.appendChild(bubble);
            chatArea.appendChild(group);
            chatArea.scrollTop = chatArea.scrollHeight;
            return { group, bubble, text: '' };
        }

        function addToolIndicator(toolName, toolInput) {
            const el = document.createElement('div');
            el.className = 'tool-indicator';
            el.innerHTML = '<span class="tool-icon">⚡</span>'
                + '<span class="tool-name">' + toolName + '</span> '
                + '<span class="tool-input">' + (toolInput || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</span>';
            chatArea.appendChild(el);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendTextMessage(text) {
            if (!text.trim() || isStreaming) return;
            isStreaming = true;
            textInput.disabled = true;
            textSendBtn.disabled = true;
            statusEl.textContent = 'Thinking...';
            statusEl.className = 'status processing';

            addMessage(text, 'user');

            const stream = createStreamingBubble();
            let fullText = '';

            try {
                const formData = new FormData();
                formData.append('text', text);

                const resp = await fetch(API_BASE + '/api/chat-stream', {
                    method: 'POST',
                    body: formData,
                });

                if (!resp.ok) {
                    // Fallback to non-streaming
                    const formData2 = new FormData();
                    formData2.append('text', text);
                    const fallback = await fetch(API_BASE + '/api/chat', {
                        method: 'POST',
                        body: formData2,
                    });
                    const data = await fallback.json();
                    stream.bubble.innerHTML = renderMarkdown(data.reply || 'No response');
                    if (data.model_lock) updateModelUI(data.model_lock);
                    isStreaming = false;
                    textInput.disabled = false;
                    textSendBtn.disabled = false;
                    statusEl.textContent = 'Ready';
                    statusEl.className = 'status';
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // Parse SSE events from buffer
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';  // Keep incomplete last line

                    let eventType = '';
                    for (const line of lines) {
                        if (line.startsWith('event: ')) {
                            eventType = line.slice(7).trim();
                        } else if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            try {
                                const data = JSON.parse(dataStr);
                                handleStreamEvent(eventType, data, stream);
                            } catch (e) { /* skip malformed */ }
                        }
                    }
                }
            } catch (err) {
                stream.bubble.innerHTML = renderMarkdown(fullText || 'Connection error: ' + err.message);
            } finally {
                // Remove cursor
                const cursor = stream.bubble.querySelector('.stream-cursor');
                if (cursor) cursor.remove();
                isStreaming = false;
                textInput.disabled = false;
                textSendBtn.disabled = false;
                textInput.focus();
                statusEl.textContent = 'Ready';
                statusEl.className = 'status';
            }
        }

        function handleStreamEvent(eventType, data, stream) {
            switch (eventType) {
                case 'agent_text':
                    // Append text delta
                    stream.text += data.text || '';
                    const cursor = stream.bubble.querySelector('.stream-cursor');
                    stream.bubble.innerHTML = renderMarkdown(stream.text) + (cursor ? '<span class="stream-cursor"></span>' : '');
                    chatArea.scrollTop = chatArea.scrollHeight;
                    statusEl.textContent = 'Writing...';
                    statusEl.className = 'status speaking';
                    break;

                case 'agent_tool_start':
                    addToolIndicator(data.tool, '');
                    statusEl.textContent = (data.tool || 'Tool') + '...';
                    statusEl.className = 'status processing';
                    break;

                case 'agent_tool_call':
                    addToolIndicator(data.tool, data.input);
                    break;

                case 'agent_tool_result':
                    // Tool result received — just update status
                    statusEl.textContent = 'Thinking...';
                    statusEl.className = 'status processing';
                    break;

                case 'agent_done':
                    statusEl.textContent = 'Ready';
                    statusEl.className = 'status';
                    break;

                case 'agent_error':
                    if (!stream.text) {
                        stream.text = 'Error: ' + (data.error || 'Unknown');
                        stream.bubble.innerHTML = renderMarkdown(stream.text);
                    }
                    statusEl.textContent = 'Error';
                    statusEl.className = 'status';
                    break;

                case 'chat_reply':
                    // Final assembled reply — update bubble with full text and model lock
                    if (data.reply && !stream.text) {
                        stream.bubble.innerHTML = renderMarkdown(data.reply);
                    } else if (data.reply && stream.text) {
                        // Streaming already showed text, just finalize
                        stream.bubble.innerHTML = renderMarkdown(stream.text);
                    }
                    if (data.model_lock) updateModelUI(data.model_lock);
                    if (data.task_id) {
                        showToast('Background task started', 'info');
                    }
                    break;

                case 'permission_request':
                    // Interactive approval (#2) — show approve/deny UI
                    addPermissionRequest(data);
                    statusEl.textContent = 'Waiting for approval...';
                    statusEl.className = 'status';
                    break;

                case 'keepalive':
                    break;
            }
        }

        // ---- Permission approval UI (#2) ----
        function addPermissionRequest(data) {
            const el = document.createElement('div');
            el.className = 'permission-request';
            const permId = data.id || '';
            el.innerHTML = '<div class="perm-title">⚠️ Permission: ' + (data.tool || 'Unknown') + '</div>'
                + '<div class="perm-detail">' + ((data.input || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')) + '</div>'
                + '<div class="perm-actions" id="perm-actions-' + permId + '">'
                + '<button class="perm-btn approve" data-perm-id="' + permId + '" data-allow="true">Approve</button>'
                + '<button class="perm-btn deny" data-perm-id="' + permId + '" data-allow="false">Deny</button>'
                + '</div>';
            chatArea.appendChild(el);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Wire up click handlers
            el.querySelectorAll('.perm-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.permId;
                    const allow = btn.dataset.allow;
                    try {
                        const fd = new FormData();
                        fd.append('id', id);
                        fd.append('allow', allow);
                        await fetch(API_BASE + '/api/permission-respond', { method: 'POST', body: fd });
                    } catch (e) { console.error('Permission respond failed:', e); }
                    // Replace buttons with result
                    const actionsEl = document.getElementById('perm-actions-' + id);
                    if (actionsEl) {
                        actionsEl.innerHTML = allow === 'true'
                            ? '<span style="color:#22C55E;font-size:12px">✓ Approved</span>'
                            : '<span style="color:#EF4444;font-size:12px">✗ Denied</span>';
                    }
                });
            });
        }

        // Text input event handlers
        textInput.addEventListener('input', () => {
            textSendBtn.disabled = !textInput.value.trim() || isStreaming;
        });

        textInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && textInput.value.trim() && !isStreaming) {
                e.preventDefault();
                sendTextMessage(textInput.value);
                textInput.value = '';
                textSendBtn.disabled = true;
            }
        });

        textSendBtn.addEventListener('click', () => {
            if (textInput.value.trim() && !isStreaming) {
                sendTextMessage(textInput.value);
                textInput.value = '';
                textSendBtn.disabled = true;
            }
        });

        // ---- Call timer ----
        function startTimer() {
            callStartTime = Date.now();
            callTimer.classList.add('active');
            timerInterval = setInterval(() => {
                const s = Math.floor((Date.now() - callStartTime) / 1000);
                const m = Math.floor(s / 60);
                callTimer.textContent = String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            callTimer.classList.remove('active');
        }

        // ---- Audio playback ----
        function playBase64Audio(b64, format) {
            return new Promise((resolve) => {
                try {
                    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                    const blob = new Blob([bytes], { type: 'audio/' + format });
                    const url = URL.createObjectURL(blob);
                    currentAudio = new Audio(url);
                    currentAudio.onended = () => {
                        URL.revokeObjectURL(url);
                        currentAudio = null;
                        resolve();
                    };
                    currentAudio.onerror = () => {
                        currentAudio = null;
                        resolve();
                    };
                    currentAudio.play().catch(() => resolve());
                } catch (e) {
                    console.error('Playback failed:', e);
                    resolve();
                }
            });
        }

        function stopPlayback() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
        }

        function speakNotification(text) {
            return new Promise((resolve) => {
                const synth = window.speechSynthesis;
                if (!synth || !text) {
                    resolve();
                    return;
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1;
                utterance.pitch = 1;
                utterance.onend = () => resolve();
                utterance.onerror = () => resolve();
                synth.speak(utterance);
            });
        }

        async function playTaskNotification(item) {
            if (!item) return;
            if (item.taskId) {
                try {
                    const resp = await fetch(API_BASE + '/api/tasks/' + encodeURIComponent(item.taskId) + '/voice-summary');
                    if (!resp.ok) throw new Error('task voice summary unavailable');
                    const data = await resp.json();
                    if (data.audio_base64) {
                        await playBase64Audio(data.audio_base64, data.audio_format || 'mp3');
                        return;
                    }
                    if (data.spoken_text) {
                        await speakNotification(data.spoken_text);
                        return;
                    }
                } catch (err) {
                    console.log('Task voice playback failed:', err);
                }
            }
            await speakNotification(item.text || '');
        }

        async function flushPendingNotifications() {
            if (!inCall || phase !== 'listening' || speakingNotification || currentAudio || pendingNotifications.length === 0) {
                return;
            }

            speakingNotification = true;
            const item = pendingNotifications.shift();
            setPhase('speaking');
            await playTaskNotification(item);
            speakingNotification = false;

            if (inCall) {
                setPhase('listening');
                if (pendingNotifications.length > 0) {
                    flushPendingNotifications();
                }
            }
        }

        // ===============================
        // CALL LIFECYCLE
        // ===============================

        callBtn.addEventListener('click', () => {
            if (inCall) endCall(); else startCall();
        });

        async function startCall() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
                });
            } catch (err) {
                addMessage('Microphone permission required.', 'error');
                return;
            }

            inCall = true;
            vibrate(100);

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(mediaStream);
            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 512;
            source.connect(analyserNode);

            startTimer();
            beginListening();
        }

        function endCall() {
            inCall = false;
            vibrate(100);

            stopVAD();
            stopRecorder();
            stopPlayback();
            stopTimer();

            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close().catch(() => {});
                audioContext = null;
            }

            setPhase('idle');
        }

        function beginListening() {
            if (!inCall) return;

            setPhase('listening');
            audioChunks = [];
            speechDetected = false;
            silenceStart = 0;
            currentRecorderMimeType = pickRecorderMimeType();
            const recorderOptions = currentRecorderMimeType ? { mimeType: currentRecorderMimeType } : undefined;
            mediaRecorder = recorderOptions
                ? new MediaRecorder(mediaStream, recorderOptions)
                : new MediaRecorder(mediaStream);
            currentRecorderMimeType = mediaRecorder.mimeType || currentRecorderMimeType || '';

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.start(100);
            startVAD();
        }

        function startVAD() {
            const dataArray = new Float32Array(analyserNode.fftSize);

            vadInterval = setInterval(() => {
                if (!inCall || phase !== 'listening') return;

                analyserNode.getFloatTimeDomainData(dataArray);

                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i] * dataArray[i];
                const rms = Math.sqrt(sum / dataArray.length);

                const pct = Math.min(100, (rms / 0.15) * 100);
                volumeBar.style.width = pct + '%';

                const now = Date.now();

                if (rms > SILENCE_THRESHOLD) {
                    if (!speechDetected) {
                        speechDetected = true;
                        speechStart = now;
                    }
                    silenceStart = 0;
                } else {
                    if (speechDetected && silenceStart === 0) {
                        silenceStart = now;
                    }

                    if (speechDetected && silenceStart > 0) {
                        const speechDuration = silenceStart - speechStart;
                        const silenceDuration = now - silenceStart;

                        if (silenceDuration >= SILENCE_DURATION && speechDuration >= MIN_SPEECH_DURATION) {
                            stopVAD();
                            sendAudio();
                        }
                    }
                }
            }, 50);
        }

        function stopVAD() {
            clearInterval(vadInterval);
            vadInterval = null;
        }

        function stopRecorder() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                try { mediaRecorder.stop(); } catch {}
            }
            mediaRecorder = null;
        }

        async function sendAudio() {
            if (!inCall) return;

            setPhase('processing');

            await new Promise(resolve => {
                if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                    resolve();
                    return;
                }
                mediaRecorder.onstop = () => resolve();
                mediaRecorder.stop();
            });

            const blobMimeType = currentRecorderMimeType
                || (audioChunks[0] && audioChunks[0].type)
                || 'application/octet-stream';
            const audioBlob = new Blob(audioChunks, { type: blobMimeType });

            if (audioBlob.size < 500) {
                if (inCall) beginListening();
                return;
            }

            try {
                const formData = new FormData();
                const ext = extensionForMimeType(blobMimeType);
                formData.append('audio', audioBlob, `recording.${ext}`);

                const resp = await fetch(API_BASE + '/api/voice', {
                    method: 'POST',
                    body: formData,
                });

                if (!inCall) return;

                const raw = await resp.text();
                let data;
                try {
                    data = JSON.parse(raw);
                } catch {
                    throw new Error(`HTTP ${resp.status}: ${raw.slice(0, 160) || 'Non-JSON response'}`);
                }

                if (data.error) {
                    addMessage(data.error, 'error');
                } else {
                    if (data.transcript) addMessage(data.transcript, 'user');
                    if (data.reply) addMessage(data.reply, 'agent');
                    updateModelFromResponse(data);
                    if (data.task_id) {
                        syncTaskById(data.task_id, 'Background task');
                    }

                    if (data.audio_base64 && inCall) {
                        setPhase('speaking');
                        await playBase64Audio(data.audio_base64, data.audio_format || 'mp3');
                    }
                }
            } catch (err) {
                if (inCall) addMessage('Connection error: ' + err.message, 'error');
            }

            if (inCall) {
                beginListening();
                flushPendingNotifications();
            }
        }

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Enter' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                if (inCall) endCall(); else startCall();
            }
        });
    })();
    </script>
</body>
</html>
