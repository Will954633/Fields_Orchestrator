<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0A0A0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fields Agent</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0A0A0F;
            color: #F9FAFB;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Header */
        .header {
            padding: 16px 20px 12px;
            text-align: center;
            flex-shrink: 0;
        }

        .mode-toggle {
            display: inline-flex;
            background: #1F2937;
            border-radius: 24px;
            padding: 3px;
            gap: 2px;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 22px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: #9CA3AF;
        }

        .mode-btn.active {
            background: #2563EB;
            color: white;
        }

        .model-label {
            color: #6B7280;
            font-size: 12px;
            margin-top: 8px;
        }

        /* Chat area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scroll-behavior: smooth;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .msg-label {
            font-size: 11px;
            color: #6B7280;
            padding: 0 4px;
            margin-top: 8px;
        }

        .msg-label.user { text-align: right; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.45;
            max-width: 88%;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg-bubble.user {
            background: #1E3A5F;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg-bubble.agent {
            background: #1F2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-bubble.error {
            background: #7F1D1D;
            align-self: center;
            font-size: 13px;
        }

        /* Bottom controls */
        .controls {
            padding: 12px 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .status {
            font-size: 14px;
            color: #9CA3AF;
            min-height: 20px;
        }

        .status.recording { color: #EF4444; }
        .status.processing { color: #F59E0B; }

        .ptt-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #2563EB;
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        .ptt-btn:active, .ptt-btn.recording {
            background: #EF4444;
            transform: scale(1.12);
        }

        .ptt-btn.processing {
            background: #4B5563;
            pointer-events: none;
        }

        .ptt-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
        }

        /* Pulse animation while recording */
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
        }

        .ptt-btn.recording {
            animation: pulse 1.2s ease-in-out infinite;
        }

        /* Spinner for processing */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* Connection dot */
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .connection-dot.ok { background: #22C55E; }
        .connection-dot.fail { background: #EF4444; }
        .connection-dot.checking { background: #F59E0B; }
    </style>
</head>
<body>
    <div class="header">
        <div class="mode-toggle">
            <button class="mode-btn active" data-mode="work">Work</button>
            <button class="mode-btn" data-mode="strategy">Strategy</button>
        </div>
        <div class="model-label" id="modelLabel">
            <span class="connection-dot checking" id="connDot"></span>
            Claude Sonnet · VM Access
        </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="controls">
        <div class="status" id="status">Connecting...</div>
        <button class="ptt-btn" id="pttBtn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
    </div>

    <script>
        const API_BASE = location.origin;
        let currentMode = 'work';
        let isRecording = false;
        let isBusy = false;
        let mediaRecorder = null;
        let audioChunks = [];

        const chatArea = document.getElementById('chatArea');
        const status = document.getElementById('status');
        const pttBtn = document.getElementById('pttBtn');
        const modelLabel = document.getElementById('modelLabel');
        const connDot = document.getElementById('connDot');

        // --- Mode toggle ---
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                updateModelLabel();
            });
        });

        function updateModelLabel() {
            const dot = connDot.outerHTML;
            if (currentMode === 'strategy') {
                modelLabel.innerHTML = dot + 'GPT-5.4 · Strategy & Business';
            } else {
                modelLabel.innerHTML = dot + 'Claude Sonnet · VM Access';
            }
        }

        // --- Health check ---
        async function healthCheck() {
            try {
                const r = await fetch(API_BASE + '/api/health');
                if (r.ok) {
                    connDot.className = 'connection-dot ok';
                    setStatus('Hold button to speak');
                } else {
                    throw new Error('not ok');
                }
            } catch {
                connDot.className = 'connection-dot fail';
                setStatus('Cannot reach server');
            }
        }
        healthCheck();

        // --- Status ---
        function setStatus(text, cls) {
            status.textContent = text;
            status.className = 'status' + (cls ? ' ' + cls : '');
        }

        // --- Chat bubbles ---
        function addMessage(text, type) {
            const group = document.createElement('div');
            group.className = 'msg-group';

            const label = document.createElement('div');
            label.className = 'msg-label ' + type;
            if (type === 'user') label.textContent = 'You';
            else if (type === 'error') label.textContent = '';
            else label.textContent = currentMode === 'work' ? 'Claude' : 'GPT-5.4';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble ' + type;
            bubble.textContent = text;

            if (type !== 'error') group.appendChild(label);
            group.appendChild(bubble);
            chatArea.appendChild(group);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // --- Audio playback ---
        function playBase64Audio(b64, format) {
            try {
                const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
                const blob = new Blob([bytes], { type: 'audio/' + format });
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play().catch(() => {});
                audio.onended = () => URL.revokeObjectURL(url);
            } catch (e) {
                console.error('Audio playback failed:', e);
            }
        }

        // --- Recording ---
        async function startRecording() {
            if (isBusy || isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true }
                });

                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus'
                        : 'audio/webm'
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.start(100); // collect chunks every 100ms
                isRecording = true;
                pttBtn.classList.add('recording');
                setStatus('Listening...', 'recording');

                // Haptic feedback
                if (navigator.vibrate) navigator.vibrate(50);

            } catch (err) {
                console.error('Mic error:', err);
                setStatus('Microphone access denied');
                addMessage('Microphone permission required. Tap the lock icon in your browser address bar to allow it.', 'error');
            }
        }

        async function stopRecordingAndSend() {
            if (!isRecording || !mediaRecorder) return;

            isRecording = false;
            pttBtn.classList.remove('recording');

            return new Promise((resolve) => {
                mediaRecorder.onstop = async () => {
                    // Stop all tracks
                    mediaRecorder.stream.getTracks().forEach(t => t.stop());

                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });

                    if (audioBlob.size < 1000) {
                        setStatus('Hold longer to record');
                        resolve();
                        return;
                    }

                    isBusy = true;
                    pttBtn.classList.add('processing');
                    pttBtn.innerHTML = '<div class="spinner"></div>';
                    setStatus('Processing...', 'processing');
                    if (navigator.vibrate) navigator.vibrate(50);

                    try {
                        const formData = new FormData();
                        const ext = mediaRecorder.mimeType.includes('webm') ? 'webm' : 'ogg';
                        formData.append('audio', audioBlob, 'recording.' + ext);
                        formData.append('mode', currentMode);

                        const resp = await fetch(API_BASE + '/api/voice', {
                            method: 'POST',
                            body: formData,
                        });

                        const data = await resp.json();

                        if (data.error) {
                            addMessage(data.error, 'error');
                        } else {
                            if (data.transcript) addMessage(data.transcript, 'user');
                            if (data.reply) addMessage(data.reply, 'agent');
                            if (data.audio_base64) playBase64Audio(data.audio_base64, data.audio_format || 'mp3');
                        }
                    } catch (err) {
                        console.error('Send error:', err);
                        addMessage('Failed to reach server: ' + err.message, 'error');
                    }

                    isBusy = false;
                    pttBtn.classList.remove('processing');
                    pttBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>';
                    setStatus('Hold button to speak');
                    resolve();
                };

                mediaRecorder.stop();
            });
        }

        // --- Touch events (works on mobile) ---
        pttBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            startRecording();
        });

        pttBtn.addEventListener('pointerup', (e) => {
            e.preventDefault();
            stopRecordingAndSend();
        });

        pttBtn.addEventListener('pointerleave', (e) => {
            if (isRecording) stopRecordingAndSend();
        });

        // Prevent context menu on long press
        pttBtn.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- Keyboard shortcut (spacebar) for desktop ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                startRecording();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                stopRecordingAndSend();
            }
        });
    </script>
</body>
</html>
